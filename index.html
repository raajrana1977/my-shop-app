<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghosia Shop Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-4 bg-gray-100 font-sans">
    <div class="max-w-md mx-auto">
        <h1 class="text-2xl font-bold text-center text-blue-900 mb-4">Ghosia Shop Pro</h1>

        <!-- LIVE DAILY PROFIT DISPLAY -->
        <div class="bg-blue-600 text-white p-4 rounded-2xl shadow-lg mb-6 text-center">
            <p class="text-xs opacity-80 uppercase font-bold">Today's Live Profit</p>
            <h2 id="liveNet" class="text-3xl font-black">Rs. 0</h2>
        </div>

        <!-- INPUT SECTION -->
        <div class="bg-white p-5 rounded-2xl shadow-sm space-y-4 mb-6">
            <h2 class="text-sm font-bold text-gray-400 uppercase tracking-wider">Daily Records</h2>
            
            <div><label class="text-sm font-bold">Total Sales</label>
            <input type="number" id="Sales" oninput="updateLive()" class="w-full p-3 bg-gray-50 border rounded-xl outline-blue-500"></div>
            
            <div><label class="text-sm font-bold">Product Cost</label>
            <input type="number" id="Cost" oninput="updateLive()" class="w-full p-3 bg-gray-50 border rounded-xl outline-blue-500"></div>

            <div class="grid grid-cols-3 gap-2">
                <div><label class="text-xs font-bold text-gray-500">Salary 1</label><input type="number" id="Sal1" oninput="updateLive()" class="w-full p-2 border rounded"></div>
                <div><label class="text-xs font-bold text-gray-500">Salary 2</label><input type="number" id="Sal2" oninput="updateLive()" class="w-full p-2 border rounded"></div>
                <div><label class="text-xs font-bold text-gray-500">Salary 3</label><input type="number" id="Sal3" oninput="updateLive()" class="w-full p-2 border rounded"></div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div><label class="text-xs font-bold text-gray-500">Gas Bill</label><input type="number" id="Gas" oninput="updateLive()" class="w-full p-3 border rounded"></div>
                <div><label class="text-xs font-bold text-gray-500">Elec Bill</label><input type="number" id="Elec" oninput="updateLive()" class="w-full p-3 border rounded"></div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div><label class="text-xs font-bold text-gray-500">Staff Food</label><input type="number" id="Food" oninput="updateLive()" class="w-full p-3 border rounded"></div>
                <div><label class="text-xs font-bold text-gray-500">Tea Expense</label><input type="number" id="Tea" oninput="updateLive()" class="w-full p-3 border rounded"></div>
            </div>

            <input type="number" id="Other" oninput="updateLive()" placeholder="Other Expenses" class="w-full p-3 border rounded">

            <button onclick="saveData()" id="btn" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-4 rounded-2xl shadow-md transition-all">
                SAVE TO GOOGLE SHEET
            </button>
        </div>

        <!-- MONTHLY CALCULATION BOX -->
        <div class="bg-slate-900 p-6 rounded-2xl shadow-xl text-white">
            <h2 class="text-sm font-bold text-slate-400 uppercase tracking-wider mb-4">Month-End Settlement</h2>
            
            <div id="monthlyDisplay" class="hidden space-y-4 mb-4">
                <div class="flex justify-between items-center border-b border-slate-700 pb-2">
                    <span class="text-slate-400">Total Profit:</span>
                    <span id="monthlyTotal" class="text-xl font-bold">Rs. 0</span>
                </div>
                <div class="p-3 bg-slate-800 rounded-lg">
                    <p class="text-xs text-blue-400 font-bold uppercase">Partner 1 (Split - 15k)</p>
                    <p id="p1Final" class="text-2xl font-black">Rs. 0</p>
                </div>
                <div class="p-3 bg-slate-800 rounded-lg">
                    <p class="text-xs text-yellow-500 font-bold uppercase">Partner 2 (Split + 15k)</p>
                    <p id="p2Final" class="text-2xl font-black">Rs. 0</p>
                </div>
            </div>

            <button onclick="calculateMonthEnd()" class="w-full bg-slate-700 hover:bg-slate-600 text-white py-3 rounded-xl font-bold border border-slate-600">
                CALCULATE MONTH END
            </button>
        </div>
    </div>

    <script>
        // PASTE YOUR URL BELOW
        const scriptURL = 'https://script.google.com/macros/s/AKfycbypkEcBhN8HHtFiJbqs9f2gLnkLgMum6Me7Ag7d5CGwCKc8D-F3SgY_m_O5B4BRqXJc4A/exec';

        function updateLive() {
            const s = parseFloat(document.getElementById('Sales').value) || 0;
            const c = parseFloat(document.getElementById('Cost').value) || 0;
            const ex = ['Sal1','Sal2','Sal3','Gas','Elec','Food','Tea','Other'].reduce((a,id)=>a+(parseFloat(document.getElementById(id).value)||0),0);
            const dailyNet = s - c - ex;
            document.getElementById('liveNet').innerText = "Rs. " + dailyNet.toLocaleString();
            return dailyNet;
        }

        async function saveData() {
            if(!document.getElementById('Sales').value) return alert("Enter Sales first!");
            const btn = document.getElementById('btn');
            btn.innerText = "Saving...";
            btn.disabled = true;

            const params = new URLSearchParams();
            ['Sales','Cost','Sal1','Sal2','Sal3','Gas','Elec','Food','Tea','Other'].forEach(id => {
                params.append(id, document.getElementById(id).value || 0);
            });

            try {
                await fetch(scriptURL + "?" + params.toString());
                alert("Saved successfully!");
                location.reload();
            } catch (e) { 
                alert("Check your Internet or Script URL."); 
                btn.innerText="Save"; 
                btn.disabled = false;
            }
        }

        function calculateMonthEnd() {
            // For now, this calculates based on the screen numbers. 
            // In the future, we can make it pull the REAL sum from Google Sheets.
            const netProfit = updateLive();
            
            const baseSplit = netProfit / 2;
            const p1 = baseSplit - 15000;
            const p2 = baseSplit + 15000;

            document.getElementById('monthlyDisplay').classList.remove('hidden');
            document.getElementById('monthlyTotal').innerText = "Rs. " + netProfit.toLocaleString();
            document.getElementById('p1Final').innerText = "Rs. " + p1.toLocaleString();
            document.getElementById('p2Final').innerText = "Rs. " + p2.toLocaleString();
        }
    </script>
</body>
</html>
