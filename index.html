<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghosia Shop Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-4 bg-gray-50 font-sans">

    <div class="max-w-md mx-auto">
        <h1 class="text-2xl font-bold text-center text-blue-900 mb-6">Ghosia Shop Manager</h1>

        <!-- SECTION 1: DAILY INPUT -->
        <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-200 mb-6">
            <h2 class="text-sm font-bold text-gray-400 uppercase tracking-wider mb-4">1. Daily Record Entry</h2>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Total Sales (Rs.)</label>
                    <input type="number" id="sales" placeholder="0" class="w-full mt-1 p-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Product Cost</label>
                        <input type="number" id="cost" placeholder="0" class="w-full mt-1 p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Total Salaries</label>
                        <input type="number" id="salaries" placeholder="0" class="w-full mt-1 p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Utilities (Gas/Elec)</label>
                        <input type="number" id="utils" placeholder="0" class="w-full mt-1 p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Food & Tea</label>
                        <input type="number" id="food" placeholder="0" class="w-full mt-1 p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700">Other Expenses</label>
                    <input type="number" id="other" placeholder="0" class="w-full mt-1 p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none">
                </div>

                <button onclick="saveDailyData()" id="saveBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl transition-all shadow-lg shadow-blue-100">
                    SAVE TODAY'S DATA
                </button>
            </div>
        </div>

        <!-- SECTION 2: MONTHLY CALCULATION -->
        <div class="bg-slate-900 p-6 rounded-2xl shadow-xl">
            <h2 class="text-sm font-bold text-slate-400 uppercase tracking-wider mb-4">2. Monthly Settlement</h2>
            
            <div id="monthlyDisplay" class="hidden space-y-4">
                <div class="flex justify-between items-center text-slate-300">
                    <span>Total Net Profit:</span>
                    <span id="monthlyTotal" class="text-xl font-bold text-white">Rs. 0</span>
                </div>
                <div class="h-px bg-slate-800"></div>
                <div class="p-4 bg-slate-800 rounded-xl">
                    <p class="text-xs text-slate-400 uppercase mb-1">Partner 1 (After -15k Loan)</p>
                    <p id="p1Final" class="text-2xl font-bold text-blue-400">Rs. 0</p>
                </div>
                <div class="p-4 bg-slate-800 rounded-xl border border-yellow-900/30">
                    <p class="text-xs text-slate-400 uppercase mb-1">Partner 2 (After +15k Loan)</p>
                    <p id="p2Final" class="text-2xl font-bold text-yellow-500">Rs. 0</p>
                </div>
            </div>

            <button onclick="calculateMonthEnd()" class="w-full mt-2 bg-slate-800 text-slate-300 py-3 rounded-xl font-medium border border-slate-700 hover:bg-slate-700">
                View Monthly Calculation
            </button>
        </div>
    </div>

    <script>
        // 1. YOUR GOOGLE SCRIPT URL GOES HERE
        const scriptURL = 'PASTE_YOUR_URL_HERE'; 

        // Function to send data to Google Sheets
        async function saveDailyData() {
            const btn = document.getElementById('saveBtn');
            const originalText = btn.innerText;
            
            // Get values
            const sales = document.getElementById('sales').value || 0;
            const cost = document.getElementById('cost').value || 0;
            const salaries = document.getElementById('salaries').value || 0;
            const utils = document.getElementById('utils').value || 0;
            const food = document.getElementById('food').value || 0;
            const other = document.getElementById('other').value || 0;

            if(sales == 0) { alert("Please enter today's sales!"); return; }

            btn.innerText = "Processing...";
            btn.disabled = true;

            const params = new URLSearchParams({
                'Sales': sales,
                'Cost': cost,
                'Salaries': salaries,
                'Utilities': utils,
                'Food': food,
                'Other': other
            });

            try {
                // Send data using GET method (simpler for Apps Script Web Apps)
                await fetch(scriptURL + "?" + params.toString(), { method: 'GET' });
                alert("Data saved successfully to your Google Sheet!");
                location.reload(); 
            } catch (e) { 
                alert("Saved locally! Make sure your Script URL is correct."); 
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }

        // Function to show the monthly split and loan math
        function calculateMonthEnd() {
            const sales = parseFloat(document.getElementById('sales').value) || 0;
            const cost = parseFloat(document.getElementById('cost').value) || 0;
            const expenses = (parseFloat(document.getElementById('salaries').value) || 0) + 
                             (parseFloat(document.getElementById('utils').value) || 0) + 
                             (parseFloat(document.getElementById('food').value) || 0) + 
                             (parseFloat(document.getElementById('other').value) || 0);
            
            const netProfit = sales - cost - expenses;
            
            // Monthly Logic: Split first, then adjust 15,000 once
            const baseSplit = netProfit / 2;
            const p1 = baseSplit - 15000;
            const p2 = baseSplit + 15000;

            document.getElementById('monthlyDisplay').classList.remove('hidden');
            document.getElementById('monthlyTotal').innerText = "Rs. " + netProfit.toLocaleString();
            document.getElementById('p1Final').innerText = "Rs. " + p1.toLocaleString();
            document.getElementById('p2Final').innerText = "Rs. " + p2.toLocaleString();
        }
    </script>
</body>
</html>
